<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f1a"/>
      <stop offset="50%" stop-color="#151815"/>
      <stop offset="100%" stop-color="#111411"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00863F" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6CC551" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00863F" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00863F" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00863F" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <rect width="960" height="720" fill="url(#bg)"/>
  <rect width="960" height="720" fill="url(#accent)"/>
  
  <!-- Subtle geometric pattern -->
  <line x1="280.0" y1="280.0" x2="680.0" y2="280.0" stroke="url(#line)" stroke-width="1"/>
  <line x1="340.0" y1="415.0" x2="620.0" y2="415.0" stroke="url(#line)" stroke-width="1"/>
  
  <!-- Minimal image icon -->
  <g transform="translate(480.0, 340.0)" opacity="0.25">
    <rect x="-24" y="-18" width="48" height="36" rx="3" fill="none" stroke="#6CC551" stroke-width="1.5"/>
    <circle cx="-8" cy="-4" r="5" fill="none" stroke="#6CC551" stroke-width="1.5"/>
    <path d="M-24,14 L-8,-2 L0,6 L12,-6 L24,10" fill="none" stroke="#6CC551" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  
  <!-- Label -->
  <text x="480.0" y="395.0" text-anchor="middle" font-family="'Source Sans 3', 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#4a6a4a" letter-spacing="5" text-transform="uppercase">PLANT HEALTH</text>
  <text x="480.0" y="418.0" text-anchor="middle" font-family="'Source Sans 3', 'Segoe UI', sans-serif" font-size="12" fill="#3a4a3a" letter-spacing="2">Lawn care photo</text>
</svg>